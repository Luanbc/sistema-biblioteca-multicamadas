<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Biblioteca</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="logo">📚 Biblio<span>Tech</span></div>
        <p>Sistema de Gestão de Acervo</p>
    </header>

    <main class="container">
        <!-- Lado Esquerdo: Formulário -->
        <section class="form-section">
            <h2 id="form-title">Adicionar Novo Livro</h2>
            <form id="book-form">
                <input type="hidden" id="book-id">
                
                <div class="input-group">
                    <label>Título do Livro</label>
                    <input type="text" id="titulo" required placeholder="Ex: Dom Quixote">
                </div>
                
                <div class="input-group">
                    <label>Autor</label>
                    <input type="text" id="autor" required placeholder="Ex: Miguel de Cervantes">
                </div>
                
                <div class="row">
                    <div class="input-group">
                        <label>Ano de Publicação</label>
                        <input type="number" id="ano" placeholder="Ex: 1605">
                    </div>
                    <div class="input-group">
                        <label>Edição</label>
                        <input type="text" id="edicao" placeholder="Ex: 1ª Edição">
                    </div>
                </div>

                <div class="input-group">
                    <label>Editora</label>
                    <input type="text" id="editora" placeholder="Ex: Nova Fronteira">
                </div>

                <div class="input-group">
                    <label>Localização na Biblioteca</label>
                    <input type="text" id="localizacao" placeholder="Ex: Corredor C - Prateleira 5">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="btn-save">Salvar Livro</button>
                    <button type="button" class="btn-secondary hidden" id="btn-cancel">Cancelar Edição</button>
                </div>
            </form>
        </section>

        <!-- Lado Direito: Lista de Livros -->
        <section class="list-section">
            <h2>Acervo Atual</h2>
            <div id="books-grid" class="books-grid">
                <!-- Os cards dos livros serão injetados aqui pelo JavaScript -->
                <div class="loading">Carregando acervo...</div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
